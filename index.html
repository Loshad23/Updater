<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Club | Рейтинг</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --gold: #fbbf24;
            --silver: #e2e8f0;
            --bronze: #fb923c;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            margin-top: 10px;
        }

        .leaderboard {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .player-row {
            display: grid;
            grid-template-columns: 60px 1fr 100px;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .player-row:last-child { border-bottom: none; }
        .player-row:hover { background: rgba(255,255,255,0.02); }

        .rank {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* Цвета для топ-3 */
        .rank-1 { color: var(--gold); }
        .rank-2 { color: var(--silver); }
        .rank-3 { color: var(--bronze); }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--accent);
        }

        .player-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .elo-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>🏓 PING PONG ELITE</h1>
        <p>Рейтинговая таблица клуба</p>
    </header>

    <div class="leaderboard" id="board">
        </div>

    <div class="footer">
        Обновлено: <span id="update-date"></span>
    </div>
</div>

<script>
    // === ТВОЙ СПИСОК ИГРОКОВ ===
    // Просто меняй цифры здесь и делай Push на GitHub
    const players = [
        { name: "Артур", elo: 0 },
        { name: "Леша", elo: 0 },
        { name: "Эдик", elo: 0 },
        { name: "Митя", elo: 0 },
        { name: "Коля", elo: 0 },
        { name: "Максим", elo: 0 }
    ];

    function render() {
        const board = document.getElementById('board');
        // Сортировка: сначала самые сильные
        players.sort((a, b) => b.elo - a.elo);

        board.innerHTML = players.map((player, index) => {
            const rank = index + 1;
            let rankClass = '';
            if (rank === 1) rankClass = 'rank-1';
            if (rank === 2) rankClass = 'rank-2';
            if (rank === 3) rankClass = 'rank-3';

            return `
                <div class="player-row">
                    <div class="rank ${rankClass}">${rank}</div>
                    <div class="player-info">
                        <div class="avatar">${player.name[0]}</div>
                        <div class="player-name">${player.name}</div>
                    </div>
                    <div class="elo-badge">${player.elo}</div>
                </div>
            `;
        }).join('');

        // Ставим сегодняшнюю дату
        document.getElementById('update-date').innerText = new Date().toLocaleDateString();
    }

    render();
</script>

</body>
</html>
