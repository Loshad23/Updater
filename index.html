<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пинг-Понг Про Статистика</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #a855f7;
            --status-guest: #fbbf24;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: #ffffff;
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 480px; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Верхний статус */
        .status-container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .status-label { font-size: 10px; letter-spacing: 2px; color: #94a3b8; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .current-match { font-size: 18px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        
        .status-guest-text { color: var(--status-guest); text-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }

        /* Таблица лидеров */
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin: 0; background: linear-gradient(to right, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 4px; font-weight: 900; }

        .list { display: flex; flex-direction: column; gap: 12px; }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            opacity: 0;
            animation: slideIn 0.5s forwards;
        }

        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } from { opacity: 0; transform: translateX(-20px); } }

        .rank-1 { border-left: 4px solid var(--gold); }
        .rank-2 { border-left: 4px solid var(--silver); }
        .rank-3 { border-left: 4px solid var(--bronze); }

        .rank-number { width: 40px; font-size: 20px; font-weight: 900; color: #475569; }
        .rank-1 .rank-number { color: var(--gold); }
        
        .player-main { flex-grow: 1; }
        
        /* Имя и БЕЙДЖ */
        .name-wrapper { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .name { font-size: 17px; font-weight: 700; color: #f8fafc; }
        
        /* Бейдж статуса игрока */
        .player-status-badge {
            font-size: 9px;
            background: rgba(251, 191, 36, 0.15);
            color: var(--status-guest);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        
        .stats-grid { display: flex; gap: 10px; }
        .stat-item { background: rgba(0, 0, 0, 0.2); padding: 3px 8px; border-radius: 6px; }
        .stat-label { font-size: 8px; color: #94a3b8; text-transform: uppercase; }
        .stat-value { font-size: 11px; font-weight: 600; }

        .elo-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            padding: 8px;
            border-radius: 12px;
            font-weight: 800;
            min-width: 55px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .update-info { text-align: center; margin-top: 30px; font-size: 10px; color: #64748b; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-container">
        <span class="status-label">Сейчас идет</span>
        <div class="current-match status-guest-text">
            <span class="live-dot"></span>
            Дружеский матч
        </div>
    </div>

    <div class="header">
        <h1>ТАБЛИЦА ЛИДЕРОВ</h1>
    </div>

    <div id="leaderboard" class="list"></div>

    <div class="update-info">
        ОБНОВЛЕНО: <span id="date"></span>
    </div>
</div>

<script>
    // В поле status пишем "гость", чтобы появился бейдж
    const players = [
        { name: "Эдик", elo: 230, games: 60, hours: 4.3 },
        { name: "Артур", elo: 180, games: 60, hours: 4.0 },
        { name: "Леша", elo: 175, games: 20, hours: 2.3 },
        { name: "Дима", elo: 50, games: 10, hours: 1.5, status: "гость" }, // Добавил Диму со статусом
        { name: "Митя", elo: 0, games: 0,  hours: 0 },
        { name: "Коля", elo: 0, games: 0, hours: 0 },
        { name: "Максим", elo: 0, games: 0,  hours: 0 }
    ];

    function init() {
        const board = document.getElementById('leaderboard');
        players.sort((a, b) => b.elo - a.elo);
        
        board.innerHTML = players.map((p, i) => `
            <div class="player-card rank-${i+1}" style="animation-delay: ${i * 0.1}s">
                <div class="rank-number">${i+1}</div>
                <div class="player-main">
                    <div class="name-wrapper">
                        <span class="name">${p.name}</span>
                        ${p.status === 'гость' ? '<span class="player-status-badge">В ГОСТЯХ</span>' : ''}
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item"><span class="stat-label">Игры</span> <span class="stat-value">${p.games}</span></div>
                        <div class="stat-item"><span class="stat-label">Часы</span> <span class="stat-value">${p.hours}ч</span></div>
                    </div>
                </div>
                <div class="elo-badge">${p.elo}</div>
            </div>
        `).join('');

        document.getElementById('date').innerText = new Date().toLocaleDateString('ru-RU');
    }
    init();
</script>

</body>
</html>
