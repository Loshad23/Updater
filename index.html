<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ping Pong Pro Stats</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .header h1 {
            font-size: 26px;
            margin: 0;
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-card {
            background: #1a1f29;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            border: 1px solid #2d3544;
            position: relative;
            overflow: hidden;
        }

        /* Индикатор первого места */
        .rank-1 { border-left: 5px solid #fbbf24; background: linear-gradient(90deg, #242b38 0%, #1a1f29 100%); }
        .rank-2 { border-left: 5px solid #cbd5e1; }
        .rank-3 { border-left: 5px solid #cd7f32; }

        .rank-number {
            width: 40px;
            font-size: 20px;
            font-weight: 900;
            color: #475569;
            flex-shrink: 0;
        }

        .rank-1 .rank-number { color: #fbbf24; }
        .rank-2 .rank-number { color: #cbd5e1; }
        .rank-3 .rank-number { color: #cd7f32; }

        .player-main {
            flex-grow: 1;
        }

        .name {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .stats-grid {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .elo-section {
            text-align: right;
            margin-left: 10px;
        }

        .elo-badge {
            background: #0ea5e9;
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25);
            display: block;
        }

        .elo-label {
            font-size: 10px;
            color: #0ea5e9;
            font-weight: bold;
            margin-top: 4px;
            text-align: center;
        }

        .update-info {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #475569;
            border-top: 1px solid #1e293b;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DASHBOARD</h1>
    </div>

    <div id="leaderboard" class="list">
        </div>

    <div class="update-info">
        Данные обновлены: <span id="date"></span>
    </div>
</div>

<script>
    // === ТВОИ ДАННЫЕ (МЕНЯЙ ТУТ) ===
    const players = [
        { name: "Артур", elo: 1500, games: 12, hours: 24 },
        { name: "Леша", elo: 1450, games: 15, hours: 30 },
        { name: "Эдик", elo: 1400, games: 10, hours: 18 },
        { name: "Митя", elo: 1350, games: 8,  hours: 12 },
        { name: "Коля", elo: 1300, games: 20, hours: 45 },
        { name: "Максим", elo: 1250, games: 5,  hours: 7 }
    ];

    function init() {
        const board = document.getElementById('leaderboard');
        // Сортировка по Эло
        players.sort((a, b) => b.elo - a.elo);

        board.innerHTML = players.map((p, i) => `
            <div class="player-card rank-${i+1}">
                <div class="rank-number">${i+1}</div>
                <div class="player-main">
                    <span class="name">${p.name}</span>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Матчи</span>
                            <span class="stat-value">${p.games}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Часы</span>
                            <span class="stat-value">${p.hours}ч</span>
                        </div>
                    </div>
                </div>
                <div class="elo-section">
                    <div class="elo-badge">${p.elo}</div>
                    <div class="elo-label">POINTS</div>
                </div>
            </div>
        `).join('');

        document.getElementById('date').innerText = new Date().toLocaleString('ru-RU', { 
            day: 'numeric', month: 'long', year: 'numeric' 
        });
    }

    init();
</script>

</body>
</html>
